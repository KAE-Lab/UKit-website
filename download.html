<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger UKit</title>
    <meta name="description"
        content="Téléchargez UKit, le kit de l'étudiant bordelais, sur l'App Store ou le Google Play Store.">
    <link rel="icon" type="image/png" href="/icon.png">

    <!-- =========================================================
         REDIRECTION OS — le plus haut possible dans le <head>
         pour s'exécuter avant tout rendu.
    ========================================================= -->
    <script>
        (function () {
            var ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                window.location.replace('https://play.google.com/store/apps/details?id=com.bordeaux1.emplois');
            } else if (/iphone|ipad|ipod/i.test(ua)) {
                window.location.replace('https://apps.apple.com/app/id1394708917');
            }
        })();
    </script>

    <script type="module" src="/src/main.js"></script>
</head>

<body
    class="bg-slate-50 text-slate-900 font-sans antialiased selection:bg-primary-blue selection:text-white overflow-x-hidden relative">

    <!-- Particules en arrière-plan (même config que index.html) -->
    <div id="tsparticles" class="fixed inset-0 z-[-1] w-full h-full pointer-events-none"
        style="-webkit-mask-image: linear-gradient(to bottom, black 60%, rgba(0,0,0,0.8) 100%); mask-image: linear-gradient(to bottom, black 60%, rgba(0,0,0,0.8) 100%);">
    </div>

    <!-- HEADER (identique à index.html) -->
    <header
        class="hidden md:block fixed top-0 left-0 w-full z-50 bg-white/40 backdrop-blur-xs border-b border-white/40 shadow-sm">
        <nav class="container mx-auto px-6 h-20 flex justify-between items-center">
            <a href="/"><img src="/logo.png" alt="UKit"
                    class="h-12 transition-transform duration-300 cursor-pointer hover:scale-105"></a>
        </nav>
    </header>

    <div
        class="md:hidden fixed top-0 left-0 w-full z-50 bg-white/40 backdrop-blur-xs border-b border-white/40 px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-1">
            <a href="/"><img src="/logo.png" alt="UKit" class="h-8 cursor-pointer active:scale-95"></a>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <main class="min-h-screen flex items-center justify-center px-6 py-32">
        <div class="flex flex-col items-center text-center gap-8 max-w-lg w-full">

            <!-- Icône -->
            <div
                class="w-20 h-20 rounded-3xl bg-gradient-to-br from-primary-blue to-primary-purple flex items-center justify-center shadow-lg shadow-primary-purple/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24"
                    stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" />
                </svg>
            </div>

            <!-- Titre & description -->
            <div class="flex flex-col gap-4">
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">
                    Disponible sur smartphone
                </h1>
                <p class="text-lg text-slate-500 leading-relaxed">
                    Ouvrez cette page depuis votre téléphone,<br class="hidden sm:block">
                    ou choisissez votre store ci-dessous.
                </p>
            </div>

            <!-- Badges officiels stores -->
            <div class="flex flex-col sm:flex-row items-center gap-2">

                <!-- Google Play (badge officiel) -->
                <a id="btn-playstore"
                   href="https://play.google.com/store/apps/details?id=com.bordeaux1.emplois"
                   target="_blank" rel="noopener"
                   class="transition-all duration-300 active:scale-95">
                    <img src="/badge-google-play.svg"
                         alt="Disponible sur Google Play"
                         class="h-14">
                </a>

                <!-- App Store (badge officiel) -->
                <a id="btn-appstore"
                   href="https://apps.apple.com/app/id1394708917"
                   target="_blank" rel="noopener"
                   class="transition-all duration-300 active:scale-95">
                    <img src="/badge-app-store.svg"
                         alt="Télécharger sur l'App Store"
                         class="h-14">
                </a>

            </div>
        </div>
    </main>

    <!-- FOOTER (identique à index.html) -->
    <footer
        class="hidden md:block fixed bottom-0 left-0 w-full z-50 border-t border-white/20 bg-white/40 backdrop-blur-xs shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.02)]">
        <div
            class="container mx-auto px-6 py-6 md:py-0 md:h-20 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-slate-500 text-sm">
                Maintenu par la team <a href="https://github.com/KAE-Lab" target="_blank"
                    class="text-slate-600 hover:text-primary-blue transition-colors font-medium">KAE Lab</a> &bull; Fork
                de <a href="https://github.com/kb-dev/UKit" target="_blank"
                    class="text-slate-600 hover:text-primary-blue transition-colors font-medium">kb-dev</a>.
            </p>
            <div class="flex items-center gap-4">
                <span class="text-slate-500 text-sm">Sous licence Apache 2.0</span>
                <a href="https://github.com/Illumye/UKit" target="_blank"
                    class="text-slate-600 hover:text-slate-900 transition flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200 hover:border-slate-300 text-sm font-medium">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill-rule="evenodd"
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                            clip-rule="evenodd" />
                    </svg>
                    GitHub
                </a>
            </div>
        </div>
    </footer>

</body>

</html>
